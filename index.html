<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THZ GHOST SENSES</title>
    <style>
        /* Configurações de Fundo e Fonte */
        body {
            margin: 0;
            padding: 0;
            background-color: #8B0000; /* Fundo Vermelho Escuro */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Sistema de Glitter */
        #glitter-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glitter {
            position: absolute;
            bottom: -10px;
            background-color: #ffffff; /* Glitter Branco */
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            opacity: 0.8;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-105vh);
                opacity: 0;
            }
        }

        /* Área de Conteúdo Central */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ffcccc;
        }

        /* Inputs e Botões */
        input {
            padding: 15px;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }

        input::placeholder {
            color: #ffb3b3;
        }

        button {
            padding: 15px 40px;
            border-radius: 8px;
            border: none;
            background-color: #000000;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        button:hover {
            background-color: #333333;
            transform: scale(1.05);
        }

        /* Resultado da Sensi */
        #result {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #ff4d4d;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .hidden {
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        /* Rodapé com Direitos Autorais */
        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.85);
            font-size: 14px;
            z-index: 1;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="content">
        <h1>THZ GHOST SENSES</h1>
        <p class="subtitle">Motor de Precisão Algorítmica para Mobile</p>
        
        <input type="text" id="phoneModel" placeholder="Digite o modelo do celular (Ex: iPhone 11)">
        <button onclick="generateSense()">CALCULAR SENSI</button>
        
        <div id="result" class="hidden">
            </div>
    </div>

    <footer>
        &copy; 2026 THZ GHOST SENSES. Todos os direitos reservados.
    </footer>

    <script>
        // 1. Lógica do Fundo com Glitter Branco Subindo
        function createGlitter() {
            const container = document.getElementById('glitter-container');
            const glitter = document.createElement('div');
            glitter.classList.add('glitter');

            // Tamanho aleatório entre 2px e 5px
            const size = Math.random() * 3 + 2; 
            glitter.style.width = size + 'px';
            glitter.style.height = size + 'px';
            
            // Posição horizontal aleatória
            glitter.style.left = Math.random() * 100 + 'vw';
            
            // Velocidade de subida aleatória entre 3s e 7s
            glitter.style.animationDuration = Math.random() * 4 + 3 + 's'; 

            container.appendChild(glitter);

            // Remove o glitter depois que ele sair da tela para não travar o celular
            setTimeout(() => {
                glitter.remove();
            }, 7000);
        }

        // Gera um novo glitter a cada 40 milissegundos
        setInterval(createGlitter, 40);

        // 2. Lógica Algorítmica (Simulação de IA para precisão)
        function generateSense() {
            const phone = document.getElementById('phoneModel').value.trim().toLowerCase();
            const resultDiv = document.getElementById('result');

            if (!phone) {
                alert("Por favor, digite o modelo de um telefone para o motor calcular.");
                return;
            }

            // Função Hash: Transforma o nome do celular em um número único base.
            // Isso garante que a "IA" dê sempre a mesma sensi perfeita para o mesmo celular.
            let hash = 0;
            for (let i = 0; i < phone.length; i++) {
                hash = phone.charCodeAt(i) + ((hash << 5) - hash);
            }

            // Cálculos baseados no hash (Gera números realistas de 75 a 100)
            const calc = (offset, min, max) => Math.abs((hash + offset) % (max - min + 1)) + min;

            const geral = calc(1, 85, 100);
            const redDot = calc(2, 80, 100);
            const mira2x = calc(3, 85, 100);
            const mira4x = calc(4, 88, 100);
            const awm = calc(5, 15, 45);
            const dpi = calc(6, 450, 900); // DPI realista entre 450 e 900

            // Mostra o resultado na tela
            resultDiv.innerHTML = `
                <h3 style="color: #ff4d4d; margin-top: 0;">Sensi Encontrada!</h3>
                <div class="result-item"><span>Geral:</span> <strong>${geral}</strong></div>
                <div class="result-item"><span>Red Dot:</span> <strong>${redDot}</strong></div>
                <div class="result-item"><span>Mira 2x:</span> <strong>${mira2x}</strong></div>
                <div class="result-item"><span>Mira 4x:</span> <strong>${mira4x}</strong></div>
                <div class="result-item"><span>AWM:</span> <strong>${awm}</strong></div>
                <div class="result-item" style="color: #ff4d4d; margin-top: 15px;"><span>DPI:</span> <strong>${dpi}</strong></div>
            `;
            
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
