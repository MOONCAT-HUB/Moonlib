<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THZ GHOST SENSES | IA NEURAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #660000;
            --neon-red: #ff0000;
            --glass: rgba(15, 15, 15, 0.75);
            --white-glitter: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #800000, #330000);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Fundo de Partículas (Glitter Lento) */
        #glitter-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-ia {
            font-size: 0.7rem;
            color: var(--neon-red);
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255,0,0,0.2); }

        button {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover { background: var(--neon-red); color: #fff; transform: scale(1.02); }

        /* Loader de Processamento Neural */
        #neural-loader {
            display: none;
            margin-top: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
            transition: width 0.1s;
        }

        /* Resultados */
        #results {
            display: none;
            margin-top: 30px;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            animation: fadeIn 1s;
        }

        .card-sensi {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 5px; }
        .value { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #fff; }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: #666;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="glitter-canvas"></canvas>

    <div class="container">
        <h1>THZ GHOST SENSES</h1>
        <p class="status-ia">Neural Network Engine v4.0</p>

        <input type="text" id="deviceInput" placeholder="MODELO DO DISPOSITIVO">
        <button id="mainBtn" onclick="runNeuralEngine()">Iniciar Processamento</button>

        <div id="neural-loader">
            <p id="loader-text" style="font-size: 0.8rem;">Carregando Tensores...</p>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>

        <div id="results">
            <div class="card-sensi"><span class="label">GERAL</span><span class="value" id="rGeral">0</span></div>
            <div class="card-sensi"><span class="label">RED DOT</span><span class="value" id="rRed">0</span></div>
            <div class="card-sensi"><span class="label">MIRA 2X</span><span class="value" id="r2x">0</span></div>
            <div class="card-sensi"><span class="label">MIRA 4X</span><span class="value" id="r4x">0</span></div>
            <div class="card-sensi" style="grid-column: span 2; border-color: var(--neon-red);">
                <span class="label" style="color: var(--neon-red);">DPI NEURAL</span>
                <span class="value" id="rDpi" style="color: var(--neon-red);">0</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 THZ GHOST SENSES - TODOS OS DIREITOS RESERVADOS
    </footer>

    <script>
        // 1. Efeito de Glitter Branco Lento no Canvas (Alta Performance)
        const canvas = document.getElementById('glitter-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 0.5 + 0.2; // Velocidade bem lenta
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) this.y = canvas.height + 10;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. Lógica de Rede Neural com TensorFlow.js
        async function runNeuralEngine() {
            const device = document.getElementById('deviceInput').value;
            if (!device) return alert("Insira o modelo!");

            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('neural-loader');
            const results = document.getElementById('results');
            const fill = document.getElementById('fill');
            const loaderText = document.getElementById('loader-text');

            btn.style.display = 'none';
            results.style.display = 'none';
            loader.style.display = 'block';

            // Simulação de Treinamento Neural
            const steps = [
                {p: 20, t: "Alocando Tensores..."},
                {p: 45, t: "Mapeando Kernel do Dispositivo..."},
                {p: 70, t: "Executando Backpropagation..."},
                {p: 90, t: "Otimizando Pesos de Precisão..."},
                {p: 100, t: "Finalizado!"}
            ];

            for (const step of steps) {
                await new Promise(r => setTimeout(r, 600));
                fill.style.width = step.p + "%";
                loaderText.innerText = step.t;
            }

            // Cálculo baseado em Inteligência Computacional Estática (Hash)
            // Garante que o mesmo celular sempre tenha a mesma sensi perfeita.
            let seed = 0;
            for (let i = 0; i < device.length; i++) seed += device.charCodeAt(i);

            const gen = (s, min, max) => {
                const val = Math.abs(Math.sin(seed * s) * (max - min) + min);
                return Math.floor(val);
            };

            document.getElementById('rGeral').innerText = gen(1.1, 185, 200);
            document.getElementById('rRed').innerText = gen(1.2, 170, 198);
            document.getElementById('r2x').innerText = gen(1.3, 180, 200);
            document.getElementById('r4x').innerText = gen(1.4, 185, 200);
            document.getElementById('rDpi').innerText = gen(1.5, 480, 960);

            setTimeout(() => {
                loader.style.display = 'none';
                results.style.display = 'grid';
                btn.style.display = 'block';
                btn.innerText = "Recalcular";
            }, 500);
        }
    </script>
</body>
</html>
