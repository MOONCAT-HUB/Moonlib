<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THZ GHOST SENSES | O Melhor do Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Reset e Configurações Globais --- */
        :root {
            --bg-color: #560303; /* Vermelho Profundo */
            --primary-accent: #ff0000; /* Vermelho Vivo Neon */
            --secondary-accent: #ff4d4d; /* Vermelho Claro */
            --glass-bg: rgba(20, 20, 20, 0.6); /* Fundo Jateado */
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #ccccff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Mantém o glitter controlado */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Sistema de Glitter Super Lento --- */
        #glitter-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glitter {
            position: absolute;
            bottom: -10px;
            background-color: rgba(255, 255, 255, 0.8); /* Branco Sutil */
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            opacity: 0;
            animation: floatUpSlow linear infinite;
        }

        @keyframes floatUpSlow {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        /* --- Conteúdo Central - Layout Premium --- */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        /* Cartão de Vidro (Glassmorphism) */
        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .main-card:hover {
            border-color: rgba(255, 0, 0, 0.3);
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.15);
        }

        /* Título Futurista */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, #ff9999, #fff);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p.subtitle {
            font-size: 1rem;
            margin-bottom: 35px;
            color: var(--text-sub);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* --- Elementos de Input e Botão --- */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: var(--secondary-accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        input::placeholder {
            color: #888;
        }

        /* Botão Premium Neon */
        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #000000, #330000);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4);
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
            transform: translateX(-100%);
        }

        button:hover::after {
            transform: translateX(100%);
        }

        /* --- Painel de Resultados (IA) --- */
        #result-panel {
            margin-top: 30px;
            border-top: 1px solid var(--glass-border);
            padding-top: 25px;
        }

        .hidden { display: none; }

        /* Animação de Entrada */
        .animate-show {
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }

        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Simulação de Carregamento da IA */
        #ai-loader {
            color: var(--secondary-accent);
            font-size: 1rem;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        #ai-loader::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Tabela de Resultados */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .result-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Destaque DPI */
        .result-item.dpi-highlight {
            grid-column: span 2;
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.2);
        }

        .result-item.dpi-highlight .result-value {
            color: var(--secondary-accent);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* --- Rodapé com Direitos Autorais --- */
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            font-size: 12px;
            z-index: 10;
            color: #888;
            letter-spacing: 1px;
            border-top: 1px solid var(--glass-border);
        }

        /* --- Responsividade (Mobile First) --- */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .main-card { padding: 30px 20px; }
            .result-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="content-wrapper">
        <div class="main-card">
            <h1>THZ GHOST SENSES</h1>
            <p class="subtitle">Algoritmo de Precisão Neural - Free Fire</p>
            
            <div class="input-group">
                <input type="text" id="phoneModel" placeholder="Digite o modelo do aparelho (Ex: Poco X3)">
            </div>
            
            <button id="calcBtn" onclick="processSenseRequest()">Calcular Sensi</button>
            
            <div id="result-panel" class="hidden">
                <div id="ai-loader">Analisando DNA do dispositivo</div>
                
                <div id="sensi-results" class="hidden">
                    <div class="result-grid">
                        <div class="result-item">
                            <span class="result-label">Geral</span>
                            <span class="result-value" id="valGeral">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Red Dot</span>
                            <span class="result-value" id="valRedDot">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Mira 2x</span>
                            <span class="result-value" id="valMira2x">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Mira 4x</span>
                            <span class="result-value" id="valMira4x">--</span>
                        </div>
                        <div class="result-item dpi-highlight">
                            <span class="result-label">DPI RECOMENDADA</span>
                            <span class="result-value" id="valDpi">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 <span style="color: #fff; font-family: 'Orbitron', sans-serif;">THZ GHOST SENSES</span>. Todos os direitos reservados. O melhor do mundo.
    </footer>

    <script>
        // --- 1. Lógica do Fundo com Glitter Super Lento ---
        function createGlitter() {
            const container = document.getElementById('glitter-container');
            const glitter = document.createElement('div');
            glitter.classList.add('glitter');

            // Tamanho aleatório: 2px a 5px
            const size = Math.random() * 3 + 2; 
            glitter.style.width = size + 'px';
            glitter.style.height = size + 'px';
            
            // Posição horizontal aleatória
            glitter.style.left = Math.random() * 100 + 'vw';
            
            // VELOCIDADE SUPER LENTA: entre 12s e 20s para subir
            glitter.style.animationDuration = Math.random() * 8 + 12 + 's'; 
            
            // Atraso aleatório para não subirem todas juntas
            glitter.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(glitter);

            // Limpeza de memória
            setTimeout(() => { glitter.remove(); }, 25000);
        }

        // Gera menos partículas para ser mais sutil
        setInterval(createGlitter, 150);


        // --- 2. Lógica do Motor Neural de Sensibilidade ---
        function processSenseRequest() {
            const phone = document.getElementById('phoneModel').value.trim();
            const resultPanel = document.getElementById('result-panel');
            const aiLoader = document.getElementById('ai-loader');
            const sensiResults = document.getElementById('sensi-results');
            const btn = document.getElementById('calcBtn');

            if (!phone) {
                alert("Por favor, informe o modelo do aparelho para a IA processar.");
                return;
            }

            // Desabilita o botão e mostra o painel com animação
            btn.disabled = true;
            btn.innerText = "Processando...";
            resultPanel.classList.remove('hidden');
            resultPanel.classList.add('animate-show');
            sensiResults.classList.add('hidden');
            aiLoader.classList.remove('hidden');

            // Simula o tempo de processamento da IA (1.5 segundos)
            setTimeout(() => {
                const senses = calculateNeuralSenses(phone);
                displayResults(senses);
                btn.disabled = false;
                btn.innerText = "Calcular Sensi";
            }, 1800);
        }

        function calculateNeuralSenses(phoneModel) {
            // Função Hash consistente para manter a sensi fixa por aparelho
            let hash = 0;
            const text = phoneModel.toLowerCase();
            for (let i = 0; i < text.length; i++) {
                hash = text.charCodeAt(i) + ((hash << 5) - hash);
            }

            const c = (offset, min, max) => Math.abs((hash + offset) % (max - min + 1)) + min;

            // Retorna os valores com o limite atual de 200 do FF
            return {
                geral: c(1, 175, 200), // Geral sempre alta
                redDot: c(2, 160, 195),
                mira2x: c(3, 170, 200),
                mira4x: c(4, 180, 200),
                dpi: c(5, 500, 960) // DPI realista do aparelho
            };
        }

        function displayResults(senses) {
            document.getElementById('ai-loader').classList.add('hidden');
            const results = document.getElementById('sensi-results');
            results.classList.remove('hidden');
            results.classList.add('animate-show');

            // Atribui os valores calculados
            document.getElementById('valGeral').innerText = senses.geral;
            document.getElementById('valRedDot').innerText = senses.redDot;
            document.getElementById('valMira2x').innerText = senses.mira2x;
            document.getElementById('valMira4x').innerText = senses.mira4x;
            document.getElementById('valDpi').innerText = senses.dpi;
        }
    </script>
</body>
</html>
