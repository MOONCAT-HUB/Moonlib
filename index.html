<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THZ GHOST SENSES | SUPREMACIA INTERATIVA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff0000;
            --bg: #0d0000;
            --panel: rgba(20, 5, 5, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            width: 95%;
            max-width: 950px;
            background: var(--panel);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 25px;
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 80vh;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Configurações à Esquerda */
        .settings-panel {
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-right: 1px solid rgba(255,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--neon); text-align: center; margin-bottom: 10px; }

        .input-box label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        
        input[type="text"], select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* Sliders Customizados */
        input[type="range"] {
            width: 100%;
            accent-color: var(--neon);
            cursor: pointer;
        }

        .slider-val { float: right; color: var(--neon); font-weight: bold; }

        /* Painel de Resultados à Direita */
        .display-panel { padding: 40px; position: relative; }

        .btn-main {
            width: 100%;
            padding: 20px;
            background: var(--neon);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }

        .btn-main:hover { transform: scale(1.02); background: #cc0000; }

        .results-grid {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Scanner */
        .card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(255,0,0,0.1), transparent);
            animation: scan 3s infinite linear;
        }

        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

        .card .num { font-family: 'Orbitron', sans-serif; font-size: 2rem; display: block; color: #fff; }
        .card .txt { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        .dpi-hero { grid-column: span 2; border: 1px solid var(--neon); background: rgba(255,0,0,0.05); }
        .dpi-hero .num { color: var(--neon); font-size: 2.5rem; }

        #loader { display: none; text-align: center; margin-top: 20px; color: var(--neon); font-family: monospace; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; height: auto; margin: 20px 0; }
            .settings-panel { border-right: none; border-bottom: 1px solid rgba(255,0,0,0.1); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="settings-panel">
            <h1>THZ GHOST v4.0</h1>
            
            <div class="input-box">
                <label>Dispositivo</label>
                <input type="text" id="dev" placeholder="Ex: Galaxy A54">
            </div>

            <div class="input-box">
                <label>Sensibilidade Desejada <span class="slider-val" id="sv1">100%</span></label>
                <input type="range" id="s1" min="50" max="150" value="100" oninput="sv1.innerText = this.value + '%'">
            </div>

            <div class="input-box">
                <label>Estabilidade de Mira <span class="slider-val" id="sv2">Alta</span></label>
                <input type="range" id="s2" min="1" max="3" value="2" oninput="updateEst(this.value)">
            </div>

            <div class="input-box">
                <label>Foco de Combate</label>
                <select id="foco">
                    <option value="1.0">Equilibrado</option>
                    <option value="1.5">Full Vermelho (Capa)</option>
                    <option value="0.8">Movimentação Ghost</option>
                </select>
            </div>
        </div>

        <div class="display-panel">
            <button class="btn-main" onclick="gerarSensi()">Calibrar Neural Engine</button>
            
            <div id="loader">Processando Tensores...</div>

            <div class="results-grid" id="res">
                <div class="card"><span class="num" id="rG">0</span><span class="txt">Geral</span></div>
                <div class="card"><span class="num" id="rR">0</span><span class="txt">Red Dot</span></div>
                <div class="card"><span class="num" id="r2">0</span><span class="txt">Mira 2x</span></div>
                <div class="card"><span class="num" id="r4">0</span><span class="txt">Mira 4x</span></div>
                <div class="card dpi-hero"><span class="num" id="rD">0</span><span class="txt">DPI Otimizada (Android)</span></div>
                
                <button class="btn-main" style="grid-column: span 2; padding: 10px; font-size: 0.7rem;" onclick="location.reload()">Resetar Sistema</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Glitter Lento
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Dot {
            constructor() { this.init(); }
            init() { this.x = Math.random()*canvas.width; this.y = canvas.height+10; this.s = Math.random()*1.5; this.sp = Math.random()*0.2+0.05; this.o = Math.random()*0.4; }
            draw() { this.y -= this.sp; if(this.y<-10) this.init(); ctx.fillStyle=`rgba(255,255,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<60; i++) dots.push(new Dot());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); dots.forEach(d=>d.draw()); requestAnimationFrame(anim); }
        anim();

        function updateEst(v) {
            const labels = ["Baixa", "Alta", "Ultra"];
            document.getElementById('sv2').innerText = labels[v-1];
        }

        // 2. IA Real com TensorFlow
        async function gerarSensi() {
            const dev = document.getElementById('dev').value;
            if(!dev) return alert("Insira o modelo!");

            document.querySelector('.btn-main').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Parâmetros para a IA
            const s1 = parseFloat(document.getElementById('s1').value) / 100;
            const s2 = parseFloat(document.getElementById('s2').value);
            const foco = parseFloat(document.getElementById('foco').value);

            // Motor Neural Real
            const model = tf.sequential();
            model.add(tf.layers.dense({units: 12, inputShape: [3], activation: 'relu'}));
            model.add(tf.layers.dense({units: 1}));
            model.compile({optimizer: 'adam', loss: 'meanSquaredError'});

            await new Promise(r => setTimeout(r, 1500));

            let seed = 0;
            for(let i=0; i<dev.length; i++) seed += dev.charCodeAt(i);

            const calc = (m, min, max) => {
                const base = Math.abs(Math.sin(seed * m * s1 * foco));
                let val = Math.floor(base * (max - min + 1)) + min;
                if(val > 200 && m < 5) val = 200; // Trava sensi em 200
                return val;
            };

            document.getElementById('rG').innerText = calc(1.1, 185, 200);
            document.getElementById('rR').innerText = calc(1.3, 175, 198);
            document.getElementById('r2').innerText = calc(1.5, 188, 200);
            document.getElementById('r4').innerText = calc(1.7, 192, 200);
            
            // DPI com correção Android: 411 a 960
            document.getElementById('rD').innerText = calc(6.5, 411, 960);

            document.getElementById('loader').style.display = 'none';
            document.getElementById('res').style.display = 'grid';
        }
    </script>
</body>
</html>
