<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX v2.0 | THZ NETWORK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: #eeeeee;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Card de Download Superior */
        .download-card {
            background: linear-gradient(145deg, #0f0f0f, #151515);
            border: 1px solid #252525;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            margin-bottom: 40px; /* Espaço para a descrição fora do box */
        }

        h1 {
            color: #8a2be2;
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }

        .version {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 25px;
            display: block;
        }

        .btn {
            display: block;
            background: #8a2be2;
            color: #fff;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3);
        }

        .btn:hover {
            background: #a020f0;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.5);
        }

        /* Seção de Descrição FORA do Quadrado */
        .main-description {
            max-width: 700px;
            width: 100%;
            text-align: left;
            padding: 20px;
        }

        .main-description h3 {
            color: #8a2be2;
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-left: 4px solid #8a2be2;
            padding-left: 15px;
            text-transform: uppercase;
        }

        .main-description p {
            color: #bbb;
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .feature-item {
            background: rgba(20, 20, 20, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
        }

        .feature-item b { color: #fff; }

        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <h1>ONYX CHAT</h1>
        <span class="version">BUILD v2.0.4-STABLE</span>
